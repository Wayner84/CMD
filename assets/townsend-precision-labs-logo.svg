<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Townsend Precision Labs Ltd logo</title>
  <desc id="desc">A muted pink engineering logo: circular emblem with stylised caliper/probe and stacked cube, plus Townsend Precision Labs Ltd wordmark.</desc>
  <rect width="1200" height="620" fill="#121017"/>
  <g fill="none" stroke="#d66ba0" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="250" cy="310" r="205" stroke-width="28"/>
  </g>
  <g fill="#d66ba0">
    <!-- Stylised CMM/caliper body inspired by the source PNG, redrawn as clean vector geometry. -->
    <path d="M142 250 L142 223 L218 183 C236 174 257 169 280 169 L329 169 C374 169 415 192 433 228 L433 275 L485 275 C494 275 501 282 501 291 L501 325 C501 333 494 340 485 340 L459 340 L437 414 C433 428 413 428 409 414 L386 340 L365 340 C356 340 349 333 349 325 L349 291 C349 282 356 275 365 275 L402 275 L402 222 L342 222 C322 222 310 232 310 251 L310 486 C310 498 300 508 288 508 L261 508 L261 414 L247 414 C235 414 225 404 225 392 L225 330 L143 278 L143 263 L275 263 L275 250 Z"/>
    <rect x="142" y="280" width="112" height="34" rx="7"/>
    <rect x="272" y="313" width="70" height="10" rx="5"/>
    <rect x="272" y="339" width="70" height="10" rx="5"/>
    <rect x="272" y="365" width="70" height="10" rx="5"/>
    <rect x="272" y="391" width="70" height="10" rx="5"/>
    <rect x="272" y="417" width="70" height="10" rx="5"/>
    <!-- Stacked cube / additive manufacturing mark. -->
    <path d="M360 390 L420 360 L480 390 L420 420 Z M389 390 L420 405 L451 390 L420 375 Z" fill="#121017"/>
    <path d="M360 390 L420 420 L480 390 L480 417 L420 449 L360 417 Z"/>
    <path d="M360 430 L420 461 L480 430 L480 455 L420 489 L360 455 Z"/>
    <path d="M360 470 L420 502 L480 470 L480 494 L420 528 L360 494 Z"/>
  </g>
  <g fill="#d66ba0" font-family="Arial Narrow, Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="6">
    <text x="570" y="250" font-size="96">TOWNSEND</text>
    <text x="570" y="365" font-size="96">PRECISION</text>
    <text x="570" y="480" font-size="96">LABS <tspan font-size="58">LTD</tspan></text>
  </g>
</svg>
